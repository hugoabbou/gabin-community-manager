services:
  - type: web
    name: gabin-cm
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: AI_PROVIDER
        value: gemini
    disk:
      name: library
      mountPath: /app/assets/library
      sizeGB: 1
