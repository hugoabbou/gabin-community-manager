services:
  - type: web
    name: gabin-cm
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: AI_PROVIDER
        value: gemini
      - key: DATA_DIR
        value: /app/data
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
