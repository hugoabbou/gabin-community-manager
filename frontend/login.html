<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gabin — Connexion</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161410;
      --border: #2a2520;
      --gold: #d4a574;
      --white: #f0ebe4;
      --gray: #7a7068;
      --red: #c0392b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 380px;
      padding: 48px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin: 20px;
    }
    .logo {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: var(--gold);
      margin: 0 auto 24px;
    }
    h1 {
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .sub {
      text-align: center;
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 36px;
    }
    label {
      display: block;
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--white);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 18px;
    }
    input:focus { border-color: var(--gold); }
    button {
      width: 100%;
      background: var(--gold);
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }
    button:hover { background: #c49464; }
    button:disabled { background: #4a443e; color: var(--gray); cursor: not-allowed; }
    .error {
      background: rgba(192,57,43,0.12);
      border: 1px solid rgba(192,57,43,0.4);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #e74c3c;
      margin-bottom: 16px;
      display: none;
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0d0d0d;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">g</div>
    <h1>Gabin Community Manager</h1>
    <p class="sub">Connexion à votre espace</p>

    <div class="error" id="error"></div>

    <form onsubmit="login(event)">
      <label>Identifiant</label>
      <input type="text" id="username" placeholder="hugo" autocomplete="username" required>

      <label>Mot de passe</label>
      <input type="password" id="password" autocomplete="current-password" required>

      <button type="submit" id="btn">Se connecter</button>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem("gabin_token")) {
      fetch("/auth/me", {
        headers: { "Authorization": "Bearer " + localStorage.getItem("gabin_token") }
      }).then(r => { if (r.ok) window.location.href = "/app"; });
    }

    async function login(e) {
      e.preventDefault();
      const btn = document.getElementById("btn");
      const err = document.getElementById("error");
      err.style.display = "none";
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Connexion…';

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          })
        });
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.detail || "Erreur de connexion");
        }
        const data = await res.json();
        localStorage.setItem("gabin_token", data.access_token);
        localStorage.setItem("gabin_user", data.username);
        window.location.href = "/app";
      } catch (e) {
        err.textContent = e.message;
        err.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Se connecter";
      }
    }
  </script>
</body>
</html>
